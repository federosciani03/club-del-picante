name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate favicon PNG from logo
        run: |
          pip install Pillow -q
          python3 << 'PYEOF'
          from PIL import Image
          img = Image.open('public/images/logocdp.jpg').convert('RGBA')
          img = img.resize((128, 128), Image.LANCZOS)
          img.save('public/favicon.png', 'PNG')
          print('favicon.png generated')
          PYEOF

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i \
            -e 's|href="/css/|href="css/|g' \
            -e 's|href="/images/|href="images/|g' \
            -e 's|href="/favicon.png|href="favicon.png|g' \
            -e 's|src="/js/|src="js/|g' \
            -e 's|src="/images/|src="images/|g' \
            public/index.html public/colabs.html
          sed -i "s|image: '/images/|image: 'images/|g" public/js/products.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload public/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
